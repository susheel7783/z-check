apiVersion: v1
# Kubernetes secret containing application secrets for Z-Check.
# Replace each placeholder with the base64-encoded secret value.
kind: Secret
metadata:
  name: zcheck-secrets
  labels:
    app: zcheck
type: Opaque
data:
  whatsapp-token: REPLACE_WITH_BASE64_ENCODED_TOKEN
  neo4j-password: REPLACE_WITH_BASE64_ENCODED_PASSWORD
  app-encryption-key: REPLACE_WITH_BASE64_ENCODED_KEY
