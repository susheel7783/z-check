apiVersion: v1
kind: Service
metadata:
  name: neo4j
  labels:
    app: neo4j
spec:
  type: ClusterIP
  ports:
    - name: browser
      port: 7474
      targetPort: 7474
    - name: bolt
      port: 7687
      targetPort: 7687
  selector:
    app: neo4j
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
  labels:
    app: neo4j
spec:
  serviceName: neo4j
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      containers:
        - name: neo4j
          image: neo4j:5.13
          ports:
            - containerPort: 7474
              name: browser
            - containerPort: 7687
              name: bolt
          env:
            # Neo4j password is loaded securely from the Kubernetes secret.
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zcheck-secrets
                  key: neo4j-password
            # Required by Neo4j image licensing and network binding.
            - name: NEO4J_dbms_default__advertised__address
              value: "0.0.0.0"
            - name: NEO4J_ACCEPT_LICENSE_AGREEMENT
              value: "yes"
          command: ["/bin/sh", "-c"]
          args:
            - export NEO4J_AUTH=neo4j:${NEO4J_PASSWORD} && exec /docker-entrypoint.sh neo4j
          volumeMounts:
            - name: neo4j-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: neo4j-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: standard
        resources:
          requests:
            storage: 20Gi
