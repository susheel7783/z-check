apiVersion: apps/v1
kind: Deployment
metadata:
  name: zcheck-backend
  labels:
    app: zcheck-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: zcheck-backend
  template:
    metadata:
      labels:
        app: zcheck-backend
    spec:
      containers:
        - name: backend
          image: gcr.io/YOUR_PROJECT_ID/zcheck-backend:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            # Bind address for the Gin server inside the pod.
            - name: BACKEND_BIND_ADDRESS
              value: ":8080"
            # Neo4j connection information.
            - name: NEO4J_URI
              value: "neo4j://neo4j:7687"
            - name: NEO4J_USER
              value: "neo4j"
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zcheck-secrets
                  key: neo4j-password
            - name: WHATSAPP_API_URL
              value: "https://graph.facebook.com/v16.0/PHONE_NUMBER_ID/messages"
            - name: WHATSAPP_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: zcheck-secrets
                  key: whatsapp-token
            # Application-level encryption key stored securely in Kubernetes.
            - name: APP_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: zcheck-secrets
                  key: app-encryption-key
            - name: ALERT_WHATSAPP_TO
              value: "+1234567890"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # Health probes ensure the deployment can be safely rolled and restarted.
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
