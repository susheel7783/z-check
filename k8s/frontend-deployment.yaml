apiVersion: apps/v1
kind: Deployment
metadata:
  name: zcheck-frontend
  labels:
    app: zcheck-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zcheck-frontend
  template:
    metadata:
      labels:
        app: zcheck-frontend
    spec:
      containers:
        - name: frontend
          image: gcr.io/YOUR_PROJECT_ID/zcheck-frontend:latest
          ports:
            - containerPort: 80
              name: http
