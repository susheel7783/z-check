apiVersion: v1
kind: Service
metadata:
  name: neo4j
  labels:
    app: neo4j
spec:
  ports:
    - name: bolt
      port: 7687
      targetPort: 7687
    - name: browser
      port: 7474
      targetPort: 7474
  clusterIP: None
  selector:
    app: neo4j
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
  labels:
    app: neo4j
spec:
  serviceName: neo4j
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      containers:
        - name: neo4j
          image: neo4j:5.13
          ports:
            - containerPort: 7687
              name: bolt
            - containerPort: 7474
              name: browser
          env:
            - name: NEO4J_AUTH
              value: "neo4j/password"
            - name: NEO4J_dbms_default__advertised__address
              value: "0.0.0.0"
            - name: NEO4J_ACCEPT_LICENSE_AGREEMENT
              value: "yes"
          volumeMounts:
            - name: neo4j-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: neo4j-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
